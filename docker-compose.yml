services:
  backend:
    build:
      context: ./backend
    container_name: stocklens-ai-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: local
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
