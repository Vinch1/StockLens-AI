name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required documentation files
        run: |
          set -euo pipefail
          required=(
            README.md
            .gitignore
            .env.example
            docker-compose.yml
            docs/product_spec.md
            docs/architecture.md
            docs/api_contract.md
            docs/security_privacy.md
            docs/test_plan.md
            docs/roadmap.md
          )
          for file in "${required[@]}"; do
            test -s "$file" || { echo "Missing or empty: $file"; exit 1; }
          done

      - name: Verify provider and screenshot safety language
        run: |
          set -euo pipefail
          rg "screenshot-derived|approximate candles|provider boundaries|provider and privacy boundaries" README.md docs
          rg "backend-only|provider|API keys" README.md docs .env.example docker-compose.yml

      - name: Check example environment contains no obvious real secrets
        run: |
          set -euo pipefail
          if rg "(sk-[A-Za-z0-9]|AKIA[0-9A-Z]{16}|-----BEGIN .*PRIVATE KEY-----)" .env.example; then
            echo "Potential secret found in .env.example"
            exit 1
          fi
